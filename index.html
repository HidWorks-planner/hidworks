<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidworks Planner | İçerik Planlayıcı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hidYellow: '#FFD700',
                        hidBlack: '#0D0D0D',
                        pinpeBlue: '#3b82f6',
                        pinpePurple: '#8b5cf6',
                        pinpeOrange: '#f59e0b',
                        pinpeGreen: '#22c55e',
                        pinpeSky: '#0ea5e9',
                        pinpeRed: '#ef4444'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
        .login-screen { background: radial-gradient(circle at center, rgba(255,215,0,0.15) 0%, #000 100%); }
        
        .pinpe-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 3rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .pinpe-header { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .pinpe-body { padding: 24px; display: flex; gap: 32px; }
        .pinpe-footer { padding: 16px 24px; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 0 0 16px 16px; }
        
        textarea { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; padding: 14px; font-size: 13px; background: #f8fafc; outline: none; transition: all 0.2s; resize: none; }
        textarea:focus { border-color: #FFD700; background: #fff; }
        .action-btn { padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 11px; color: white; transition: 0.2s; text-transform: uppercase; }
        .status-tag { background: #fff7ed; color: #c2410c; padding: 4px 14px; border-radius: 99px; font-size: 11px; font-weight: 800; border: 1px solid #ffedd5; }
    </style>
</head>
<body class="overflow-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[200] login-screen flex items-center justify-center p-6 bg-black">
        <div class="bg-[#050505] p-12 rounded-[50px] w-full max-w-md shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] text-center border border-white/10 relative">
            <div class="p-4 bg-white/90 rounded-3xl mx-auto mb-10 inline-block shadow-[0_0_60px_rgba(255,215,0,0.3)]">
                <img src="HidWorks_LogoSiyah.png" alt="HidWorks Logo" class="h-16 w-auto block">
            </div>
            <h1 class="text-3xl font-bold mb-2 text-white italic tracking-tighter uppercase">HIDWORKS</h1>
            <p class="text-hidYellow/60 text-[10px] font-bold uppercase tracking-[0.4em] mb-12 italic">İÇERİK PLANLAYICI PANELİ</p>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="KULLANICI ADI" class="w-full px-6 py-4 rounded-2xl text-center font-bold tracking-[0.2em] bg-zinc-900 text-white border-none outline-none">
                <input type="password" id="passInput" placeholder="ŞİFRE" class="w-full px-6 py-4 rounded-2xl text-center font-bold tracking-[0.5em] bg-zinc-900 text-white border-none outline-none">
                <button onclick="handleLogin()" class="w-full py-5 bg-hidYellow text-black font-black rounded-2xl hover:scale-[1.02] transition-all uppercase tracking-widest shadow-lg mt-2">Giriş Yap</button>
            </div>
            <p class="text-zinc-600 text-xs mt-6">Admin veya Müşteri bilgilerinizi giriniz.</p>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex">
        
        <aside id="hw-sidebar" class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-sm">
            <div class="p-8 border-b border-slate-50 flex-1 overflow-y-auto custom-scrollbar">
                <div class="mb-12 flex items-center justify-center">
                    <img src="HidWorks_LogoSiyah.png" alt="HidWorks Logo" class="h-12 w-auto">
                </div>

                <div class="flex items-center justify-between px-2 mb-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Markalar</p>
                    <button onclick="addNewBrand()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-hidYellow hover:text-black transition-all shadow-sm" title="Yeni Marka Ekle">
                        <i class="fas fa-plus text-[10px]"></i>
                    </button>
                </div>
                <div id="brandList" class="space-y-2 px-1 mb-8"></div>

                <div class="pt-6 border-t border-slate-100">
                    <div class="flex items-center justify-between px-2 mb-4">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Adminler</p>
                        <button onclick="addNewAdmin()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-hidYellow hover:text-black transition-all shadow-sm" title="Yeni Admin Ekle">
                            <i class="fas fa-user-plus text-[10px]"></i>
                        </button>
                    </div>
                    <div id="adminList" class="space-y-2 px-1"></div>
                </div>
            </div>

            <div class="p-8 border-t border-slate-100 bg-white">
                <button onclick="openAddModal()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-hidYellow hover:text-black transition-all shadow-xl flex items-center justify-center gap-3">
                    <i class="fas fa-plus-circle text-lg"></i> YENİ İÇERİK EKLE
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header class="h-24 px-10 border-b border-slate-200 bg-white flex items-center justify-between shadow-sm z-10">
                <div id="hw-top-nav" class="flex gap-12 h-full">
                    <button id="nav-months" onclick="showMonthsView()" class="h-full font-black text-xs uppercase tracking-widest text-slate-900 border-b-4 border-hidYellow transition-all">Aylar</button>
                    <button id="nav-grid" onclick="showGridView()" class="h-full font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-hidYellow transition-all">Instagram Grid</button>
                    
                    <button id="nav-revisions" onclick="showRevisionsView()" class="relative h-full font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-hidYellow transition-all">
                        Revizeler
                        <span id="rev-badge" class="absolute top-[35px] -right-4 bg-pinpeRed text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-full hidden shadow-md">0</span>
                    </button>
                </div>
                <div class="flex items-center gap-4 ml-auto">
                    <div class="text-right mr-2">
                        <p id="user-display-name" class="text-sm font-black text-slate-900 tracking-tight">Kullanıcı</p>
                        <p id="role-text" class="text-[10px] text-slate-400 font-bold italic uppercase">Rol</p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-hidYellow flex items-center justify-center text-black font-black shadow-sm text-sm"><i class="fas fa-user"></i></div>
                    
                    <button onclick="handleLogout()" class="w-12 h-12 rounded-2xl bg-slate-100 text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all flex items-center justify-center shadow-sm" title="Çıkış Yap">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </header>

            <div id="mainContent" class="flex-1 overflow-y-auto p-12 custom-scrollbar">
                
                <div id="viewMonths" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>

                <div id="viewFlow" class="hidden space-y-12 max-w-6xl mx-auto pb-24">
                    <div class="flex items-center justify-between sticky top-0 bg-slate-50/95 backdrop-blur-md z-20 py-6 border-b border-slate-200 mb-8">
                        <button onclick="showMonthsView()" class="text-xs font-black text-slate-500 hover:text-slate-900 transition-all flex items-center gap-3 bg-white px-5 py-3 rounded-xl shadow-sm border border-slate-200">
                            <i class="fas fa-arrow-left"></i> AYLARA GERİ DÖN
                        </button>
                        <div class="flex items-center gap-4 bg-white px-6 py-3 rounded-xl border border-slate-200 shadow-sm">
                            <i class="fas fa-calendar-alt text-hidYellow"></i>
                            <span id="flowMonthTitle" class="text-xs font-black uppercase tracking-widest italic">Ay</span>
                            <span class="text-slate-200">|</span>
                            <span id="flowBrandName" class="text-xs font-black text-hidYellow uppercase tracking-widest italic">Marka</span>
                        </div>
                    </div>
                    <div id="flowContainer" class="space-y-16"></div>
                </div>

                <div id="viewGrid" class="hidden flex flex-col items-center">
                    <div class="w-[360px] h-[740px] bg-white border-[14px] border-slate-950 rounded-[60px] shadow-2xl overflow-hidden relative">
                        <div class="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10"><span class="font-bold text-[11px] tracking-widest uppercase italic" id="gridTitle">istifci_urla</span><i class="fas fa-bars text-xs"></i></div>
                        <div id="instagramGrid" class="grid grid-cols-3 gap-0.5 mt-3 px-0.5"></div>
                    </div>
                </div>

                <div id="viewRevisions" class="hidden space-y-6 max-w-5xl mx-auto pb-24">
                    <div class="flex items-center justify-between sticky top-0 bg-slate-50/95 backdrop-blur-md z-20 py-6 border-b border-slate-200 mb-8">
                        <h2 class="text-2xl font-black italic uppercase text-slate-900"><i class="fas fa-comment-dots text-hidYellow mr-2"></i> Müşteri Revize İstekleri</h2>
                    </div>
                    <div id="revisionsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>

            </div>
        </main>
    </div>

    <div id="addModal" class="fixed inset-0 z-[300] hidden bg-slate-900/90 flex items-center justify-center p-6 backdrop-blur-lg">
        <div class="bg-white w-full max-w-4xl rounded-[40px] border border-white/20 overflow-hidden flex shadow-2xl max-h-[90vh]">
            <div class="w-1/2 bg-slate-50 p-12 flex flex-col items-center justify-center border-r border-slate-200 relative group">
                <i class="fas fa-cloud-upload-alt text-6xl text-slate-200 group-hover:text-hidYellow transition-all"></i>
                <p class="mt-6 text-[11px] font-black text-slate-400 uppercase tracking-widest">Görsel Seç</p>
                <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <img id="imagePreview" class="absolute inset-0 w-full h-full object-cover hidden">
            </div>
            <div class="w-1/2 p-12 flex flex-col space-y-5 overflow-y-auto">
                <h3 class="font-black italic text-2xl uppercase mb-6 tracking-tighter">PLAN OLUŞTUR</h3>
                <div class="grid grid-cols-2 gap-4">
                    <select id="p-month" class="p-4 text-xs font-bold rounded-2xl border bg-slate-50 outline-none"></select>
                    <input type="date" id="p-date" class="p-4 text-xs font-bold rounded-2xl border bg-slate-50 outline-none">
                </div>
                <input type="text" id="p-tag" placeholder="Etiket (Örn: #Gastronomi)" class="p-4 text-xs rounded-2xl border font-black bg-slate-50 outline-none">
                <textarea id="p-alt" rows="2" placeholder="Alt Metin"></textarea>
                <textarea id="p-caption" rows="3" placeholder="Görsel Metni"></textarea>
                <textarea id="p-note" rows="2" placeholder="Tasarımcı Notu"></textarea>
                <button onclick="saveContent()" class="w-full py-5 bg-hidYellow text-black font-black rounded-2xl shadow-xl hover:scale-[1.03] transition-all uppercase tracking-widest mt-4">PLANA EKLE</button>
                <button onclick="closeAddModal()" class="text-xs font-bold text-slate-400 uppercase tracking-widest pt-2">İptal</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserRole = ''; 
        let currentUserName = '';
        
        let state = JSON.parse(localStorage.getItem('hidworks_vFinal_Helin_Tecim'));
        
        // İlk Kurulum
        if (!state) {
            state = {
                admins: [{ username: 'helin', password: 'helin2004', name: 'Helin (Kurucu)' }],
                months: ['Mart 2026', 'Nisan 2026'],
                brands: [{ id: 1, name: 'İstifçi Urla', password: 'urla' }],
                contents: [{
                    id: Date.now(), brandId: 1, month: 'Mart 2026', date: '2026-03-02',
                    tag: '#Statik', alt: 'Urla atmosferi', caption: 'Urla ruhunu sofranıza taşıyoruz. ✨',
                    note: 'Görseldeki antika detayları vurgulayalım.',
                    image: 'https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=1000'
                }],
                revisions: [], // YENİ: Revize listesi
                activeBrandId: 1
            };
        }
        
        // Geriye dönük uyumluluk 
        if(!state.months) state.months = ['Mart 2026', 'Nisan 2026'];
        if(!state.admins) state.admins = [{ username: 'helin', password: 'helin2004', name: 'Helin (Kurucu)' }];
        if(!state.revisions) state.revisions = []; // Revize dizisi yoksa oluştur

        const mainAdminIndex = state.admins.findIndex(a => a.username === 'admin');
        if(mainAdminIndex !== -1) {
            state.admins[mainAdminIndex] = { username: 'helin', password: 'helin2004', name: 'Helin (Kurucu)' };
            saveState();
        }

        // GİRİŞ KONTROLÜ
        function handleLogin() {
            const user = document.getElementById('userInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            
            const matchedAdmin = state.admins.find(a => a.username === user && a.password === pass);
            
            if(matchedAdmin) {
                currentUserRole = 'admin';
                currentUserName = matchedAdmin.name;
                startApp();
            } else {
                const brand = state.brands.find(b => b.password === pass);
                if(brand) {
                    currentUserRole = 'customer';
                    currentUserName = brand.name + ' (Müşteri)';
                    state.activeBrandId = brand.id; 
                    startApp();
                } else {
                    alert('Hatalı kullanıcı adı veya şifre! Lütfen tekrar deneyin.');
                }
            }
        }

        function handleLogout() {
            currentUserRole = ''; currentUserName = '';
            document.getElementById('userInput').value = ''; document.getElementById('passInput').value = '';
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').style.display = 'flex';
        }

        function startApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            
            document.getElementById('user-display-name').innerText = currentUserName;
            document.getElementById('role-text').innerText = currentUserRole === 'admin' ? 'Admin Yetkisi' : 'Müşteri Yetkisi';
            
            renderBrands(); renderAdmins(); updateMonthSelects(); updateRevisionBadge();
            
            if (currentUserRole === 'admin') {
                document.getElementById('hw-sidebar').style.display = 'flex';
                document.getElementById('hw-top-nav').style.visibility = 'visible';
                document.getElementById('nav-revisions').style.display = 'block';
                showMonthsView();
            } else {
                document.getElementById('hw-sidebar').style.display = 'none';
                document.getElementById('hw-top-nav').style.visibility = 'hidden';
                document.getElementById('nav-revisions').style.display = 'none';
                showGridView();
            }
        }

        // --- ADMİN YÖNETİMİ ---
        function renderAdmins() {
            const list = document.getElementById('adminList');
            if(!list || currentUserRole !== 'admin') return;
            
            list.innerHTML = state.admins.map(a => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-100 group">
                    <div class="flex flex-col"><span class="text-[11px] font-bold text-slate-700">${a.name}</span><span class="text-[9px] font-medium text-slate-400">@${a.username}</span></div>
                    ${a.username !== 'helin' ? `<button onclick="deleteAdmin('${a.username}')" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all" title="Admini Sil"><i class="fas fa-trash-alt"></i></button>` : '<i class="fas fa-shield-alt text-hidYellow" title="Ana Kurucu"></i>'}
                </div>
            `).join('');
        }

        function addNewAdmin() {
            const name = prompt("Adminin Adı ve Soyadı:"); if(!name) return;
            const username = prompt("Sisteme giriş yapacağı 'Kullanıcı Adı' (Boşluksuz, örn: ahmet):"); if(!username) return;
            if(state.admins.find(a => a.username === username)) return alert("Bu kullanıcı adı zaten kullanılıyor!");
            const password = prompt("Sisteme giriş yapacağı 'Şifre':"); if(!password) return;

            state.admins.push({ username, password, name }); saveState(); renderAdmins();
            alert(`Admin başarıyla eklendi!\nKullanıcı Adı: ${username}\nŞifre: ${password}`);
        }

        function deleteAdmin(username) {
            if(confirm(`'@${username}' adlı admini silmek istediğinize emin misiniz?`)) { state.admins = state.admins.filter(a => a.username !== username); saveState(); renderAdmins(); }
        }

        // --- MARKALAR ---
        function renderBrands() {
            const list = document.getElementById('brandList');
            list.innerHTML = state.brands.map(b => `
                <div class="flex items-center gap-1 group">
                    <button onclick="selectBrand(${b.id})" class="flex-1 text-left p-4 rounded-2xl font-black flex items-center gap-4 transition-all ${state.activeBrandId === b.id ? 'bg-slate-900 text-white shadow-xl' : 'hover:bg-slate-100 text-slate-400'}">
                        <div class="w-3 h-3 rounded-full ${state.activeBrandId === b.id ? 'bg-hidYellow' : 'bg-slate-200'}"></div><span class="truncate text-[11px] uppercase tracking-wider font-bold">${b.name}</span>
                    </button>
                    ${currentUserRole === 'admin' ? `<button onclick="deleteBrand(${b.id})" class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-300 hover:text-red-500 hover:bg-red-50 transition-all opacity-0 group-hover:opacity-100" title="Markayı Sil"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>
            `).join('');
            
            const active = state.brands.find(x => x.id === state.activeBrandId);
            document.getElementById('flowBrandName').innerText = active ? active.name : "Marka Seç";
            document.getElementById('gridTitle').innerText = active ? active.name.toLowerCase().replace(/ /g, "_") : "brand";
        }

        function selectBrand(id) { state.activeBrandId = id; saveState(); renderBrands(); if(currentUserRole === 'admin') showMonthsView(); else showGridView(); }
        
        function addNewBrand() {
            const name = prompt("Marka Adı:"); if(!name) return;
            const password = prompt(`'${name}' markası için müşteri giriş şifresi belirleyin:`); if(!password) return;
            const id = Date.now(); state.brands.push({ id, name, password }); selectBrand(id);
        }

        function deleteBrand(id) {
            if(confirm("DİKKAT: Bu markayı ve ona ait TÜM içerikleri silmek istediğinize emin misiniz?")) {
                state.brands = state.brands.filter(b => b.id !== id); state.contents = state.contents.filter(c => c.brandId !== id);
                if(state.activeBrandId === id) state.activeBrandId = state.brands.length > 0 ? state.brands[0].id : null;
                saveState(); renderBrands(); if(state.activeBrandId) showMonthsView(); else hideAll();
            }
        }

        // --- AYLAR ---
        function showMonthsView() {
            if(currentUserRole !== 'admin') return;
            hideAll(); document.getElementById('viewMonths').classList.remove('hidden');
            document.getElementById('nav-months').classList.add('text-slate-900', 'border-b-4', 'border-hidYellow');
            renderMonthCards();
        }

        function renderMonthCards() {
            const container = document.getElementById('viewMonths');
            let html = state.months.map(m => {
                const count = state.contents.filter(c => c.brandId === state.activeBrandId && c.month === m).length;
                return `
                <div class="bg-white border border-slate-200 p-10 rounded-[50px] flex flex-col justify-between h-[360px] shadow-sm hover:shadow-2xl transition-all relative group">
                    ${currentUserRole === 'admin' ? `<button onclick="deleteMonth('${m}')" class="absolute top-8 right-8 w-10 h-10 rounded-full bg-slate-50 text-slate-300 hover:text-red-500 hover:bg-red-50 transition-all opacity-0 group-hover:opacity-100 flex items-center justify-center shadow-sm" title="Bu Ayı Sil"><i class="fas fa-trash-alt"></i></button>` : ''}
                    <div>
                        <div class="flex items-center gap-4 mb-10 text-slate-900"><i class="fas fa-calendar-alt text-hidYellow text-2xl"></i><h3 class="text-2xl font-black italic uppercase">${m}</h3></div>
                        <div class="grid grid-cols-2 gap-6"><div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 text-center"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">İçerik Adedi</p><p class="text-3xl font-black text-slate-900">${count}</p></div></div>
                    </div>
                    <button onclick="showFlowView('${m}')" class="w-full py-5 bg-hidYellow text-black font-black rounded-3xl uppercase text-[11px] tracking-widest shadow-lg">DETAYI GÖR</button>
                </div>
                `;
            }).join('');

            if(currentUserRole === 'admin') {
                html += `<button onclick="addNewMonth()" class="bg-slate-50 border-2 border-dashed border-slate-300 p-10 rounded-[50px] flex flex-col items-center justify-center h-[360px] text-slate-400 hover:text-hidYellow hover:border-hidYellow hover:bg-white transition-all group shadow-sm"><i class="fas fa-plus-circle text-5xl mb-4 group-hover:scale-110 transition-transform"></i><span class="font-black text-sm uppercase tracking-widest italic">YENİ AY EKLE</span></button>`;
            }
            container.innerHTML = html;
        }

        function addNewMonth() { const m = prompt("Eklemek istediğiniz ayı yazın (Örn: Mayıs 2026):"); if(m && !state.months.includes(m)) { state.months.push(m); saveState(); renderMonthCards(); updateMonthSelects(); } }
        function deleteMonth(m) { if(confirm(`'${m}' ayını tamamen silmek istediğinize emin misiniz?`)) { state.months = state.months.filter(x => x !== m); state.contents = state.contents.filter(c => c.month !== m); saveState(); renderMonthCards(); updateMonthSelects(); } }
        function updateMonthSelects() { const select = document.getElementById('p-month'); if(select) select.innerHTML = state.months.map(m => `<option value="${m}">${m}</option>`).join(''); }

        // --- AKIŞ VE DETAY ---
        function showFlowView(month) {
            if(currentUserRole !== 'admin') return;
            hideAll(); document.getElementById('viewFlow').classList.remove('hidden');
            document.getElementById('flowMonthTitle').innerText = month; renderFlow(month);
        }

        function renderFlow(month) {
            const container = document.getElementById('flowContainer');
            const filtered = state.contents.filter(c => c.brandId === state.activeBrandId && c.month === month);
            
            container.innerHTML = filtered.map((c, idx) => `
                <div class="pinpe-card">
                    <div class="pinpe-header"><div class="flex items-center gap-6"><span class="bg-black text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider italic">İçerik ${idx+1} | ${c.tag}</span><span class="text-[12px] font-bold text-slate-400 italic">${c.date}</span></div></div>
                    <div class="pinpe-body"><div class="w-1/3 flex flex-col"><div class="aspect-[4/5] bg-slate-50 rounded-[30px] overflow-hidden border border-slate-200 shadow-inner"><img src="${c.image}" class="w-full h-full object-cover"></div></div><div class="flex-1 flex flex-col gap-8"><div><label class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Alt Metin</label><textarea class="h-24" readonly>${c.alt || ''}</textarea></div><div class="grid grid-cols-2 gap-8"><div><label class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Görsel Metni</label><textarea class="h-48" readonly>${c.caption || ''}</textarea></div><div><label class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Tasarımcı Notu</label><textarea class="h-48 italic text-slate-400 font-medium" readonly>${c.note || ''}</textarea></div></div></div></div>
                    <div class="pinpe-footer"><div class="flex gap-2 ml-auto"><button onclick="deleteContent(${c.id}, '${month}')" class="action-btn bg-pinpeRed text-white"><i class="fas fa-trash-alt mr-2"></i> İçeriği Sil</button></div></div>
                </div>
            `).join('');
        }

        // --- GRID ---
        function showGridView() {
            hideAll(); document.getElementById('viewGrid').classList.remove('hidden');
            if(currentUserRole === 'admin') document.getElementById('nav-grid').classList.add('text-slate-900', 'border-b-4', 'border-hidYellow');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('instagramGrid');
            const filtered = state.contents.filter(c => c.brandId === state.activeBrandId);
            grid.innerHTML = filtered.map(c => `
                <div class="aspect-square bg-slate-100 border-[0.5px] border-slate-200 overflow-hidden relative group">
                    <img src="${c.image}" class="w-full h-full object-cover">
                    ${currentUserRole === 'customer' ? `<div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center p-2 text-center"><button onclick="requestRevision(${c.id})" class="bg-hidYellow text-black text-[10px] font-black py-3 px-4 rounded-xl uppercase shadow-lg hover:scale-105 transition-transform"><i class="fas fa-comment-dots mr-2"></i>Revize İste</button></div>` : ''}
                </div>
            `).join('');
            for(let i=filtered.length; i<12; i++) grid.innerHTML += `<div class="aspect-square bg-slate-50"></div>`;
        }

        // --- YENİ: REVİZELER EKRANI (SADECE ADMİN) ---
        function showRevisionsView() {
            if(currentUserRole !== 'admin') return;
            hideAll(); document.getElementById('viewRevisions').classList.remove('hidden');
            document.getElementById('nav-revisions').classList.add('text-slate-900', 'border-b-4', 'border-hidYellow');
            renderRevisions();
        }

        function renderRevisions() {
            const container = document.getElementById('revisionsContainer');
            if(!state.revisions || state.revisions.length === 0) {
                container.innerHTML = `<div class="col-span-full p-12 text-center text-slate-400 font-bold italic border-2 border-dashed border-slate-200 rounded-3xl">Şu an bekleyen hiçbir revize talebi bulunmuyor. 🎉</div>`;
                return;
            }
            
            container.innerHTML = state.revisions.map(rev => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex gap-6 hover:shadow-md transition-all">
                    <img src="${rev.image}" class="w-28 h-28 object-cover rounded-xl border border-slate-100">
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[10px] font-black uppercase tracking-widest text-hidYellow bg-slate-900 px-3 py-1.5 rounded-lg italic">${rev.brandName}</span>
                                <span class="text-[10px] font-bold text-slate-400"><i class="far fa-clock mr-1"></i> ${rev.date}</span>
                            </div>
                            <p class="text-sm font-medium text-slate-700 italic border-l-4 border-hidYellow pl-3 leading-relaxed">"${rev.note}"</p>
                        </div>
                        <button onclick="deleteRevision(${rev.id})" class="mt-4 text-[10px] font-black uppercase tracking-widest text-pinpeGreen hover:text-green-700 hover:bg-green-50 w-max px-4 py-2 rounded-lg transition-all flex items-center gap-2 self-end">
                            <i class="fas fa-check-circle text-sm"></i> Tamamlandı / Sil
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function requestRevision(contentId) {
            const note = prompt("Bu görsel için revize talebinizi yazın (Örn: Logonun boyutu büyütülebilir mi?):");
            if(note) {
                const content = state.contents.find(c => c.id === contentId);
                const brand = state.brands.find(b => b.id === content.brandId);
                
                state.revisions.unshift({
                    id: Date.now(),
                    contentId: contentId,
                    brandId: brand.id,
                    brandName: brand.name,
                    note: note,
                    date: new Date().toLocaleDateString('tr-TR'),
                    image: content.image
                });
                
                saveState();
                alert("Talebiniz başarıyla ajansa iletildi!\n\n(Ekibimiz panelden bu isteği görecektir.)");
            }
        }

        function deleteRevision(id) {
            state.revisions = state.revisions.filter(r => r.id !== id);
            saveState(); renderRevisions(); updateRevisionBadge();
        }

        function updateRevisionBadge() {
            const badge = document.getElementById('rev-badge');
            if(!badge || currentUserRole !== 'admin') return;
            
            if(state.revisions && state.revisions.length > 0) {
                badge.innerText = state.revisions.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // --- YARDIMCI FONKSİYONLAR ---
        function hideAll() {
            ['viewMonths', 'viewFlow', 'viewGrid', 'viewRevisions'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['nav-months', 'nav-grid', 'nav-revisions'].forEach(n => {
                const el = document.getElementById(n);
                if(el) { el.classList.remove('text-slate-900', 'border-b-4', 'border-hidYellow'); el.classList.add('text-slate-400'); }
            });
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { const img = document.getElementById('imagePreview'); img.src = ev.target.result; img.classList.remove('hidden'); };
            reader.readAsDataURL(e.target.files[0]);
        });
        
        function saveContent() {
            const img = document.getElementById('imagePreview').src;
            if(!img || img.includes('hidden')) return alert("Görsel seçimi zorunludur!");
            const data = { id: Date.now(), brandId: state.activeBrandId, month: document.getElementById('p-month').value, date: document.getElementById('p-date').value, tag: document.getElementById('p-tag').value, caption: document.getElementById('p-caption').value, alt: document.getElementById('p-alt').value, note: document.getElementById('p-note').value, image: img };
            state.contents.push(data); saveState(); closeAddModal(); showMonthsView();
        }
        
        function deleteContent(id, month) { if(confirm("İçeriği tamamen silmek istediğinize emin misiniz?")) { state.contents = state.contents.filter(c => c.id !== id); saveState(); renderFlow(month); } }

        function saveState() { localStorage.setItem('hidworks_vFinal_Helin_Tecim', JSON.stringify(state)); updateRevisionBadge(); }
    </script>
</body>
</html>
